name: codeguard-skill
version: 1.2.0
description: >
  Local AI-friendly version protection and feature indexing for vibe-coding
  beginners. Require user-confirmed success, mandatory feature indexes for
  files over 200 lines, manual important snapshots, and project-local rollback
  without depending on Git or network access.
author: CodeGuard Team
license: MIT
type: skill
scope: project
enabled: true
priority: high
prompt: SKILL.md

triggers:
  keywords:
    - codeguard
    - feature index
    - local version control
    - snapshot
    - rollback
    - protect code
    - large file
  patterns:
    - "[CodeGuard Protection]"
    - "[CodeGuard Feature Index]"
    - "[/CodeGuard Feature Index]"
    - "Feature Protection:"

cli:
  command: python
  script: scripts/codeguard.py
  legacy_script: scripts/codeguard-cli.py

capabilities:
  - local-version-protection
  - feature-indexing
  - manual-snapshots
  - success-confirmation
  - rollback
  - token-efficiency

settings:
  require_confirmation: true
  record_success_only: true
  manual_important_snapshots: true
  require_index_authorization: true
  feature_index_threshold: 200
  project_local_state_dir: .codeguard

metadata:
  created_at: "2026-03-01"
  updated_at: "2026-03-10"
  category: code-protection
  tags:
    - code-protection
    - feature-index
    - local-workflow
    - vibe-coding
    - rollback
