name: codeguard-skill
version: 1.0.0
description: >
  Protect completed or sensitive code from risky edits by requiring approval,
  creating project-local snapshots, and recording only successful changes.
author: CodeGuard Team
license: MIT
type: skill
scope: project
enabled: true
priority: high
prompt: SKILL.md

triggers:
  keywords:
    - feature protection
    - completed feature
    - do not modify
    - modification approval
    - protect code
    - codeguard
  patterns:
    - // Feature Protection:
    - "# Feature Protection:"
    - /* Feature Protection:
    - "[Completed]"
    - "[Verified]"
    - "[Stable]"
    - "[CodeGuard Protection]"

cli:
  command: python
  script: scripts/codeguard.py
  legacy_script: scripts/codeguard-cli.py

capabilities:
  - code-protection
  - snapshot-management
  - approval-workflow
  - rollback
  - modification-recording

settings:
  require_confirmation: true
  record_success_only: true
  project_local_state_dir: .codeguard

metadata:
  created_at: "2026-03-01"
  updated_at: "2026-03-09"
  category: code-protection
  tags:
    - code-protection
    - feature-protection
    - ai-ide
    - snapshots
