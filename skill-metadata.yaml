name: codeguard-skill
version: 1.0.0
description: >
  Canonical metadata for the CodeGuard skill bundle. Aligns external packaging
  files with SKILL.md, agents/openai.yaml, and the project-local snapshot CLI.
author: CodeGuard Team
license: MIT

keywords:
  - code protection
  - feature protection
  - approval workflow
  - snapshots
  - rollback

triggers:
  keywords:
    - feature protection
    - completed feature
    - do not modify
    - modification approval
    - codeguard
  patterns:
    - // Feature Protection:
    - "# Feature Protection:"
    - /* Feature Protection:
    - "[Completed]"
    - "[Verified]"
    - "[Stable]"
    - "[CodeGuard Protection]"

capabilities:
  - detect-protected-regions
  - require-approval-before-edit
  - snapshot-protected-files
  - rollback-previous-snapshots
  - record-successful-modifications

files:
  skill_prompt: SKILL.md
  agents_config: agents/openai.yaml
  cli_tool: scripts/codeguard_v2.py
  cli_wrapper: scripts/codeguard-v2.py
  legacy_cli_tool: scripts/codeguard-cli.py
  trae_registry: .trae/skills/codeguard-skill.json

security:
  require_confirmation: true
  record_success_only: true
  project_local_state_dir: .codeguard
  rollback_backup_pattern: "*.rollback-backup.*.bak"

metadata:
  created_at: "2026-03-01"
  updated_at: "2026-03-09"
  category: code-protection
  tags:
    - code-protection
    - feature-protection
    - ai-ide
    - snapshots
    - rollback
