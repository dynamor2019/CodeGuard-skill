name: codeguard-skill
version: 1.4.0
description: >
  Canonical metadata for the CodeGuard skill bundle. Aligns packaging files
  with the local-first workflow: user-confirmed success, manual important
  snapshots, mandatory feature indexes for files over 200 lines, and
  project-local rollback.
author: CodeGuard Team
license: MIT

keywords:
  - codeguard
  - local version protection
  - feature index
  - vibe coding
  - rollback

triggers:
  keywords:
    - codeguard
    - feature index
    - local version control
    - protect code
    - snapshot
    - rollback
  patterns:
    - "[CodeGuard Protection]"
    - "[CodeGuard Feature Index]"
    - "[/CodeGuard Feature Index]"
    - "Feature Protection:"

capabilities:
  - detect-protected-regions
  - require-user-confirmed-success
  - require-large-file-feature-indexes
  - create-manual-important-snapshots
  - rollback-project-local-state
  - reduce-large-file-token-usage
  - support-sidecar-indexes
  - run-doctor-repair
  - batch-workflow

files:
  skill_prompt: SKILL.md
  agents_config: agents/openai.yaml
  cli_tool: scripts/codeguard.py
  legacy_cli_tool: scripts/codeguard-cli.py
  global_launcher: cli/codeguard_cli.py
  trae_registry: .trae/skills/codeguard-skill.json

security:
  require_confirmation: true
  record_success_only: true
  require_index_authorization: true
  feature_index_threshold: 200
  project_local_state_dir: .codeguard
  rollback_backup_pattern: "*.rollback-backup.*.bak"

metadata:
  created_at: "2026-03-01"
  updated_at: "2026-03-24"
  category: code-protection
  tags:
    - code-protection
    - feature-index
    - local-workflow
    - vibe-coding
    - rollback

